<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login | THE HOUSE OF AZMANI'S</title>
  <meta name="description" content="Admin panel login for THE HOUSE OF AZMANI'S e-commerce store management.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600;700&family=Great+Vibes&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
  <style>
    .admin-login-page {
      background: #1E1E2D;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      position: relative;
      overflow: hidden;
    }

    .admin-login-page::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image:
        radial-gradient(circle at 20% 50%, rgba(212, 168, 67, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(212, 168, 67, 0.03) 0%, transparent 50%),
        radial-gradient(circle at 50% 80%, rgba(212, 168, 67, 0.02) 0%, transparent 50%);
      pointer-events: none;
    }

    .admin-login-page::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23D4A843' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
      pointer-events: none;
    }

    .admin-login-card {
      background: #27293D;
      border-radius: 16px;
      padding: 3rem;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      position: relative;
      z-index: 1;
      animation: loginCardIn 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
      transform: translateY(30px) scale(0.97);
      border: 1px solid rgba(212, 168, 67, 0.08);
    }

    @keyframes loginCardIn {
      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
      animation: logoFadeIn 1s ease 0.3s forwards;
      opacity: 0;
    }

    @keyframes logoFadeIn {
      to { opacity: 1; }
    }

    .login-logo h1 {
      font-family: 'Playfair Display', serif;
      color: #D4A843;
      font-size: 1.5rem;
      letter-spacing: 3px;
      margin: 0;
    }

    .login-logo p {
      font-family: 'Great Vibes', cursive;
      color: #D4A843;
      font-size: 1.1rem;
      margin-top: 0.3rem;
      margin-bottom: 0;
    }

    .login-logo__divider {
      width: 60px;
      height: 1px;
      background: linear-gradient(90deg, transparent, #D4A843, transparent);
      margin: 1rem auto 0;
    }

    #loginForm {
      animation: formFadeIn 0.8s ease 0.5s forwards;
      opacity: 0;
    }

    @keyframes formFadeIn {
      to { opacity: 1; }
    }

    #loginForm .form-group {
      margin-bottom: 1.5rem;
    }

    #loginForm .form-input {
      transition: border-color 0.3s ease, box-shadow 0.3s ease;
    }

    #loginForm .form-input:focus {
      border-color: #D4A843;
      box-shadow: 0 0 0 3px rgba(212, 168, 67, 0.1);
      outline: none;
    }

    .password-wrapper {
      position: relative;
    }

    .password-toggle {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: #6B6B6B;
      cursor: pointer;
      padding: 4px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.3s ease;
    }

    .password-toggle:hover {
      color: #D4A843;
    }

    .login-error {
      color: #C62828;
      font-size: 0.85rem;
      margin-bottom: 1rem;
      display: none;
      padding: 0.6rem 1rem;
      background: rgba(198, 40, 40, 0.08);
      border-radius: 8px;
      border-left: 3px solid #C62828;
      animation: shakeError 0.5s ease;
    }

    @keyframes shakeError {
      0%, 100% { transform: translateX(0); }
      10%, 30%, 50%, 70%, 90% { transform: translateX(-4px); }
      20%, 40%, 60%, 80% { transform: translateX(4px); }
    }

    .login-submit {
      width: 100%;
      padding: 0.9rem;
      font-size: 1rem;
      position: relative;
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.3s ease;
    }

    .login-submit:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 15px rgba(212, 168, 67, 0.3);
    }

    .login-submit:active {
      transform: translateY(0);
    }

    .login-back {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.8rem;
      animation: formFadeIn 0.8s ease 0.7s forwards;
      opacity: 0;
    }

    .login-back a {
      color: #D4A843;
      text-decoration: none;
      transition: color 0.3s ease;
    }

    .login-back a:hover {
      color: #E8C76A;
    }

    .floating-ornament {
      position: absolute;
      opacity: 0.03;
      pointer-events: none;
      z-index: 0;
    }

    .floating-ornament--1 {
      top: 10%;
      left: 5%;
      animation: float1 8s ease-in-out infinite;
    }

    .floating-ornament--2 {
      bottom: 15%;
      right: 8%;
      animation: float2 10s ease-in-out infinite;
    }

    @keyframes float1 {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(-20px) rotate(5deg); }
    }

    @keyframes float2 {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      50% { transform: translateY(15px) rotate(-5deg); }
    }
  </style>
</head>
<body class="admin-login-page">
  <!-- Floating decorative ornaments -->
  <svg class="floating-ornament floating-ornament--1" width="120" height="120" viewBox="0 0 24 24" fill="#D4A843" stroke="none">
    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z"/>
  </svg>
  <svg class="floating-ornament floating-ornament--2" width="100" height="100" viewBox="0 0 24 24" fill="#D4A843" stroke="none">
    <path d="M12 22C6.477 22 2 17.523 2 12S6.477 2 12 2s10 4.477 10 10-4.477 10-10 10zm0-2a8 8 0 100-16 8 8 0 000 16z"/>
  </svg>

  <div class="admin-login-card">
    <div class="login-logo">
      <h1>THE HOUSE OF AZMANI'S</h1>
      <p>Admin Panel</p>
      <div class="login-logo__divider"></div>
    </div>
    <form id="loginForm">
      <div class="form-group">
        <label class="form-label" for="adminPassword">Password</label>
        <div class="password-wrapper">
          <input type="password" id="adminPassword" class="form-input" placeholder="Enter admin password" required autocomplete="current-password">
          <button type="button" id="togglePassword" class="password-toggle" aria-label="Toggle password visibility">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div id="loginError" class="login-error">Incorrect password. Please try again.</div>
      <button type="submit" class="admin-btn admin-btn-primary login-submit">Sign In</button>
    </form>
    <p class="login-back"><a href="../index.html">← Back to Store</a></p>
  </div>

  <script src="../js/data.js"></script>
  <script src="../js/admin.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      if (AdminAuth.isLoggedIn()) {
        window.location.href = 'dashboard.html';
      }
      initAdminLogin();

      // Password toggle functionality
      var toggleBtn = document.getElementById('togglePassword');
      var passwordInput = document.getElementById('adminPassword');
      var eyeIcon = document.getElementById('eyeIcon');

      if (toggleBtn && passwordInput) {
        toggleBtn.addEventListener('click', function() {
          var isPassword = passwordInput.type === 'password';
          passwordInput.type = isPassword ? 'text' : 'password';
          eyeIcon.innerHTML = isPassword
            ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>'
            : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
        });
      }
    });
  </script>
</body>
</html>
